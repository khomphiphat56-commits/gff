<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>
<style>
body{
  margin:0;
  background:black;
  color:#00ff88;
  font-family: monospace;
  font-size:22px;
}

/* ปุ่มเริ่ม */
#startBtn{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:22px;
  background:#00ff88;
  border:none;
  cursor:pointer;
}

/* terminal */
#terminal{
  display:none;
  padding:20px;
  height:70vh;
  overflow-y:auto;
  white-space:pre-line;
}

/* bar */
.bar{
  display:none;
  width:90%;
  height:20px;
  border:2px solid #00ff88;
  margin:10px auto;
}
.progress{
  height:100%;
  width:0%;
  background:#00ff88;
}

/* overlay */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:#00ff88;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  opacity:0;
  transition:0.5s;
}
</style>
</head>
<body>

<button id="startBtn" onclick="start()">เริ่มระบบ</button>

<div id="terminal"></div>

<div class="bar">
  <div class="progress" id="progress"></div>
</div>

<div id="overlay">กำลังรีสตาร์ทระบบ...</div>

<script>
// ====== แก้ข้อมูลตรงนี้ ======
const profile = {
  name: "ชื่อเพื่อน",
  phone: "09x-xxx-xxxx",
  email: "example@gmail.com",
  facebook: "facebook.com/xxx",
  nickname: "ฉายา",
  hobby: "เล่นเกม / นอนดึก"
};
// ============================

const term=document.getElementById("terminal");
const bar=document.querySelector(".bar");
const progress=document.getElementById("progress");

function goFull(){
  const el=document.documentElement;
  if(el.requestFullscreen){
    el.requestFullscreen();
  }else if(el.webkitRequestFullscreen){
    el.webkitRequestFullscreen();
  }
}

function start(){
  goFull();
  document.getElementById("startBtn").style.display="none";
  term.style.display="block";
  bar.style.display="block";
  run();
}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

let percent=0;

function typeLine(text,cb){
  let i=0;
  let inter=setInterval(()=>{
    term.innerHTML+=text[i]||"";
    i++;
    if(i>text.length){
      clearInterval(inter);
      term.innerHTML+="\n";
      cb&&cb();
    }
  },25);
}

function addProgress(){
  percent+=rand(3,6);
  if(percent>100) percent=100;
  progress.style.width=percent+"%";
}

const steps=[

()=>typeLine("เริ่มต้นระบบ...",next),
()=>typeLine("กำลังเชื่อมต่อเซิร์ฟเวอร์...",next),
()=>typeLine("กำลังตรวจสอบอุปกรณ์...",next),

()=>typeLine("=== ระดับ 1 ===",next),
()=>typeLine("ชื่อ: "+profile.name,next),
()=>typeLine("เบอร์: "+profile.phone,next),

()=>typeLine("=== ระดับ 2 ===",next),
()=>typeLine("อีเมล: "+profile.email,next),
()=>typeLine("เฟซบุ๊ก: "+profile.facebook,next),

()=>typeLine("=== ระดับ 3 ===",next),
()=>typeLine("ชื่อเล่น: "+profile.nickname,next),
()=>typeLine("พฤติกรรม: "+profile.hobby,next),

()=>typeLine("กำลังสรุปผล...",next),

()=>fakeRestart()

];

let i=0;

function next(){
  addProgress();
  i++;
  if(i<steps.length){
    setTimeout(steps[i],800);
  }
}

function fakeRestart(){
  const o=document.getElementById("overlay");
  o.style.opacity=1;

  setTimeout(()=>{
    o.innerHTML="ระบบพร้อมใช้งาน\n(ล้อเล่นนะ 😂)";
  },3000);
}

</script>

</body>
</html>
